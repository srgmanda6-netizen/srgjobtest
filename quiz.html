<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkari Exam Quiz</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .quiz-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #003366; }
        .question { font-size: 1.2em; margin-bottom: 20px; font-weight: bold; }
        .options { list-style: none; padding: 0; }
        .option { background: #e9ecef; margin: 10px 0; padding: 12px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .option:hover { background: #007bff; color: white; }
        .correct { background: #28a745 !important; color: white; }
        .wrong { background: #dc3545 !important; color: white; }
        #result { margin-top: 20px; font-size: 1.3em; font-weight: bold; display: none; }
        .btn-home { display: inline-block; margin-top: 20px; color: #003366; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Daily Mock Test ✍️</h1>
    <div id="quiz-box">
        <p class="question" id="question-text">प्रश्न यहाँ दिखेगा...</p>
        <div class="options" id="options-container">
            <!-- ऑप्शंस यहाँ आएंगे -->
        </div>
    </div>
    
    <div id="result"></div>
    <a href="index.html" class="btn-home">← वापस होम पेज पर जाएँ</a>
</div>

<script>
    // यहाँ आप अपने सवाल (Questions) बदल सकते हैं
    const quizData = [
        {
            q: "भारत की राजधानी क्या है?",
            a: ["मुंबई", "कोलकाता", "नई दिल्ली", "चेन्नई"],
            correct: 2 // 0 से गिनती शुरू होती है (2 मतलब नई दिल्ली)
        },
        {
            q: "भारतीय संविधान का जनक किसे कहा जाता है?",
            a: ["महात्मा गांधी", "डॉ. बी.आर. अम्बेडकर", "जवाहरलाल नेहरू", "सरदार पटेल"],
            correct: 1
        }
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuiz() {
        const qText = document.getElementById("question-text");
        const optCont = document.getElementById("options-container");
        optCont.innerHTML = "";
        
        qText.innerText = `Q${currentQ + 1}: ${quizData[currentQ].q}`;
        
        quizData[currentQ].a.forEach((opt, index) => {
            const div = document.createElement("div");
            div.innerText = opt;
            div.classList.add("option");
            div.onclick = () => checkAnswer(index, div);
            optCont.appendChild(div);
        });
    }

    function checkAnswer(selected, element) {
        const correctIdx = quizData[currentQ].correct;
        if(selected === correctIdx) {
            element.classList.add("correct");
            score++;
        } else {
            element.classList.add("wrong");
        }

        setTimeout(() => {
            currentQ++;
            if(currentQ < quizData[currentQ-1] ? quizData.length : 0) { // Fix for last question
                 if (currentQ < quizData.length) {
                    loadQuiz();
                 } else {
                    showResult();
                 }
            } else {
                showResult();
            }
        }, 1000);
    }

    function showResult() {
        document.getElementById("quiz-box").style.display = "none";
        const res = document.getElementById("result");
        res.style.display = "block";
        res.innerHTML = `आपका स्कोर: ${score} / ${quizData.length} <br> <span style="color:green">बधाई हो!</span>`;
    }

    loadQuiz();
</script>

</body>
</html>
